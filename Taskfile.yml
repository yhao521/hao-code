version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "haoyun-code"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  _APP_NAME: "haoyun-code"
  VERSION_1: "0"
  VERSION_2: "0"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  package:all:
    summary: Packages all platforms (Windows, macOS, Linux) installers for both arm64 and amd64
    desc: |
      Creates installers for all supported platforms and architectures:
      - Windows: NSIS installer (.exe) and ZIP archive (amd64 + arm64)
      - macOS: DMG archive (.dmg), ZIP (.zip) and .app bundle (amd64 + arm64 + universal)
      - Linux: AppImage, DEB, RPM, AUR packages (amd64 + arm64)
    cmds:
      - echo "Starting cross-platform packaging for all architectures..."

      # Windows packaging - amd64
      - echo "Packaging Windows amd64..."
      - task: windows:package
        vars:
          FORMAT: nsis
          ARCH: amd64
      - task: windows:create:zip
        vars:
          ARCH: amd64

      # Windows packaging - arm64
      - echo "Packaging Windows arm64..."
      - task: windows:package
        vars:
          FORMAT: nsis
          ARCH: arm64
      - task: windows:create:zip
        vars:
          ARCH: arm64

      # macOS packaging - amd64
      - echo "Packaging macOS amd64..."
      - task: darwin:package
        vars:
          ARCH: amd64
      - task: darwin:create:dmg
        vars:
          ARCH: amd64
      - task: darwin:create:zip
        vars:
          ARCH: amd64

      # macOS packaging - arm64
      - echo "Packaging macOS arm64..."
      - task: darwin:package
        vars:
          ARCH: arm64
      - task: darwin:create:dmg
        vars:
          ARCH: arm64
      - task: darwin:create:zip
        vars:
          ARCH: arm64

      # macOS packaging - universal (arm64 + amd64)
      - echo "Packaging macOS universal binary..."
      - task: darwin:package:universal
      - task: darwin:create:dmg
        vars:
          ARCH: universal
      - task: darwin:create:zip
        vars:
          ARCH: universal

      # Linux packaging - amd64
      - echo "Packaging Linux amd64..."
      - task: linux:package
        vars:
          ARCH: amd64

      # Linux packaging - arm64
      - echo "Packaging Linux arm64..."
      - task: linux:package
        vars:
          ARCH: arm64

      - echo "All platform packages created successfully!"
      - echo "Check the bin/ directory for output files"

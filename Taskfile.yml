version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "haoyun-code"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  _APP_NAME: "haoyun-code"
  VERSION_1: "0"
  VERSION_2: "0"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  package:all:
    summary: Packages all platforms (Windows, macOS, Linux) installers
    desc: |
      Creates installers for all supported platforms:
      - Windows: NSIS installer (.exe) and ZIP archive
      - macOS: DMG archive (.dmg), ZIP (.zip) and .app bundle
      - Linux: AppImage, DEB, RPM, AUR packages
    cmds:
      - echo "Starting cross-platform packaging..."

      # Windows packaging
      - echo "Packaging Windows..."
      - task: windows:package
        vars:
          FORMAT: nsis
      - task: windows:create:zip

      # macOS packaging
      - echo "Packaging macOS..."
      - task: darwin:package
      - task: darwin:create:dmg
      - task: darwin:create:zip

      # Linux packaging
      - echo "Packaging Linux..."
      - task: linux:package

      - echo "All platform packages created successfully!"
      - echo "Check the bin/ directory for output files"

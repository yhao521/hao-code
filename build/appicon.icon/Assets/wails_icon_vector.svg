<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    <!-- Background rounded square - solid blue -->
    <rect x="16" y="16" width="480" height="480" rx="80" fill="#2563eb" />
    
    <!-- HC Letter combination - white solid fill -->
    <g fill="white" stroke="none">
        <!-- Letter H -->
        <!-- Left vertical bar -->
        <rect x="87" y="138" width="28" height="230" rx="14" />
        <!-- Right vertical bar -->
        <rect x="217" y="138" width="28" height="230" rx="14" />
        <!-- Middle horizontal bar -->
        <rect x="87" y="239" width="158" height="28" rx="14" />
        
        <!-- Letter C (block style - top, right, bottom bars) -->
        <!-- Top horizontal bar -->
        <rect x="271" y="138" width="154" height="28" rx="14" />
        <!-- Right vertical bar -->
        <rect x="397" y="138" width="28" height="230" rx="14" />
        <!-- Bottom horizontal bar -->
        <rect x="271" y="340" width="154" height="28" rx="14" />
    </g>
    
    <!-- Accent line at bottom - light blue -->
    <rect x="75" y="380" width="362" height="13" rx="6" fill="#93c5fd" />
</svg>

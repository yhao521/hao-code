<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="code" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)" />
  
  <!-- Inner shadow effect -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="#93c5fd" stroke-width="8" opacity="0.3" />
  
  <!-- Code bracket symbol < /> -->
  <g transform="translate(106, 136)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Opening bracket < -->
    <polyline points="0,0 120,120 0,240" stroke-width="28" />
    
    <!-- Slash / -->
    <line x1="160" y1="0" x2="40" y2="240" stroke-width="28" />
    
    <!-- Closing bracket > -->
    <polyline points="120,0 0,120 120,240" stroke-width="28" transform="translate(180, 0)" />
  </g>
  
  <!-- Accent line at bottom -->
  <rect x="106" y="380" width="300" height="12" rx="6" fill="#93c5fd" opacity="0.8" />
</svg>
